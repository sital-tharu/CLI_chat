description: "Gemini Python Expert Chatbot Tests"

providers:
  - file://provider.py

prompts:
  - "{{question}}"

tests:
  # Test 1: Basic Python syntax knowledge
  - vars:
      question: "What is a list comprehension in Python? Give a one-line example."
    assert:
      - type: icontains
        value: "for"
      - type: icontains
        value: "["

  # Test 2: Error explanation
  - vars:
      question: "What causes an IndexError in Python?"
    assert:
      - type: icontains
        value: "index"
      - type: llm-rubric
        value: "The response explains that IndexError occurs when accessing a list/sequence index that doesn't exist"

  # Test 3: Practical advice
  - vars:
      question: "How do I read a file in Python safely?"
    assert:
      - type: icontains
        value: "with open"
      - type: icontains
        value: "context"

  # Test 4: Response quality — should be concise and practical
  - vars:
      question: "What is the difference between a tuple and a list in Python?"
    assert:
      - type: icontains
        value: "immutable"
      - type: icontains
        value: "mutable"
      - type: javascript
        value: "output.length < 1500"

  # Test 5: On-topic check
  - vars:
      question: "How do I make pasta carbonara?"
    assert:
      - type: icontains
        value: "python"
